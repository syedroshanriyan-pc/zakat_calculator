<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Zakat Calculator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:linear-gradient(135deg,#eef2ff,#f9fbff);
font-family:system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
}

.wrapper{
min-height:100dvh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.card{
width:100%;
max-width:650px;
border-radius:18px;
box-shadow:0 15px 40px rgba(0,0,0,0.08);
border:none;
}

.section-title{
font-weight:600;
margin-top:18px;
color:#333;
}

input.form-control{
border-radius:10px;
padding:10px 12px;
}

input.form-control:focus{
box-shadow:0 0 0 2px rgba(25,135,84,0.2);
border-color:#198754;
}

.result-box{
font-size:18px;
font-weight:600;
background:#f8fdf9;
padding:12px;
border-radius:10px;
}

.explanation{
background:#eef6ff;
padding:14px;
border-radius:10px;
font-size:14px;
white-space:pre-line;
line-height:1.5;
}

.btn-success{
border-radius:10px;
padding:10px;
font-weight:500;
}

.btn-success:hover{
transform:translateY(-1px);
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
font-weight:700;
letter-spacing:-0.3px;
}
.section-box{
border:1px solid #e6e9ef;
border-radius:10px;
padding:15px;
margin-top:10px;
background:#ffffff;
}

.donate-box{
border:1px solid #e6e9ef;
border-radius:12px;
padding:15px;
margin-top:15px;
background:#ffffff;
}

.shimmer-btn{
position:relative;
overflow:hidden;
}

.shimmer-btn::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,0.6),
transparent
);
animation:shimmer 2s infinite;
}

@keyframes shimmer{
0%{ left:-100% }
100%{ left:100% }
}

.donation-img{
width:100%;
border-radius:10px;
margin-top:10px;
display:block;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="card p-4">

<h2 class="text-center mb-3">Zakat Calculator</h2>

<p class="text-muted text-center">
Calculate your zakat based on the live market price.
</p>

<hr>

<h5 class="section-title">Assets</h5>

<div class="mb-3">
<label class="form-label">Total Value of Gold & Silver you have from 1 year (₹)</label>
<input type="number" id="metals" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Cash at Home from 1 year (₹)</label>
<input type="number" id="cash" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">cash in bank from 1 year (₹)</label>
<input type="number" id="bank" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Investments & Shares Value you own from 1 year (₹)</label>
<input type="number" id="investments" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Business/current property Value (₹)</label>
<input type="number" id="business" class="form-control">
</div>

<hr>

<h5 class="section-title">Liabilities</h5>

<div class="mb-3">
<label class="form-label">Debts /Loans you have (₹)</label>
<input type="number" id="debts" class="form-control">
</div>

<button class="btn btn-success w-100 mb-3" onclick="calculateZakat()">
Calculate Zakat
</button>

<hr>

<h5 class="section-title">Result</h5>

<div class="result-box">

<p>Net Wealth: <span id="net"></span></p>

<p class="text-success">Zakat Payable: <span id="zakat"></span></p>

</div>

<div class="explanation mt-3" id="explanation"></div>

<hr>

<div class="donate-box">

<a href="https://dawateislamiindia.org/donations/social-media" target="_blank">

<button class="btn btn-success w-100 shimmer-btn mb-2">
Pay part Now
</button>

</a>

</div>


</div>

</div>



<script>

let goldPricePerGram = 0
let silverPricePerGram = 0


/* Load live metal prices when page loads */

async function fetchMetalPrices(){

const res = await fetch("https://api.metals.live/v1/spot")
const data = await res.json()

const goldOunce = data.find(v => v[0] === "gold")[1]
const silverOunce = data.find(v => v[0] === "silver")[1]

goldPricePerGram = goldOunce / 31.1034768
silverPricePerGram = silverOunce / 31.1034768

}

fetchMetalPrices()



function formatCurrency(x){
return new Intl.NumberFormat('en-IN',{
style:'currency',
currency:'INR'
}).format(x)
}

function getValue(id){
return parseFloat(document.getElementById(id).value) || 0
}



function calculateZakat(){

let metals = getValue("metals")
let cash = getValue("cash")
let bank = getValue("bank")
let investments = getValue("investments")
let business = getValue("business")
let debts = getValue("debts")


let totalAssets =
metals +
cash +
bank +
investments +
business


let netWealth = totalAssets - debts


/* Nisab calculation */

const goldNisab = goldPricePerGram * 87.48
const silverNisab = silverPricePerGram * 612.36

const nisab = Math.min(goldNisab, silverNisab)


/* Zakat */

let zakat = 0

if(netWealth >= nisab){
zakat = netWealth * 0.025
}


document.getElementById("net").innerText = formatCurrency(netWealth)
document.getElementById("zakat").innerText = formatCurrency(zakat)


/* Explanation */

let explanation = ""

if(netWealth <= 0){

explanation = "Enter your assets to calculate Zakat."

}
else if(netWealth < nisab){

explanation =
"Your net wealth is below the Nisab threshold.\nZakat is not required."

}
else{

explanation =
"Your net wealth exceeds Nisab.\n\n"+
"Net Wealth = "+formatCurrency(netWealth)+"\n"+
"Zakat = 2.5% × Net Wealth\n"+
"Zakat Payable = "+formatCurrency(zakat)

}

document.getElementById("explanation").innerText = explanation

}

</script>

</body>
</html>
